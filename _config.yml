# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: id

timezone: Asia/Jakarta

title: sinibaca

tagline: "Nulis kalau semua kondisi mendukung, dan itu jarang terjadi."

description: >-
  A minimal, responsive and feature-rich Jekyll theme for technical writing.

url: "https://riskiipriyadi.github.io"

social:
  name: sinibaca
  fediverse_handle:
  links:

authors:
  riskipriyadi:
    name: riskipriyadi
    url: https://twitter.com/riskipriyadi

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode:

cdn:

avatar: /assets/img/avatar.png

social_preview_image:

toc: true

search:
  provider: simple_lunr

comments:
  provider: giscus
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo: riskiipriyadi/sinibaca
    repo_id: 1234788711
    category: General
    category_id: DIC_kwDOSZlhZ84C-WCf
    mapping: pathname
    input_position: bottom
    lang: id

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

excerpt_length: 350

baseurl: "/sinibaca"

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
