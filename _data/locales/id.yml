# The layout text of site

# ----- Commons label -----

layout:
  post: Post
  category: Category
  tag: Tag

# The tabs of sidebar
tabs:
  home: Beranda
  categories: Kategori
  tags: Tag
  archives: Arsip
  about: Tentang

# the text displayed in the search bar & search results
search:
  hint: Cari
  cancel: Cancel
  no_results: Oops! No results found.

panel:
  lastmod: Baru Diperbarui
  trending_tags: Trending Tags
  toc: Contents

copyright:
  # Shown at the bottom of the post
  license:
    template: This post is licensed under :LICENSE_NAME by the author.
    name: CC BY 4.0
    link: https://creativecommons.org/licenses/by/4.0/

  # Displayed in the footer


  verbose: >-
    Except where otherwise noted, the blog posts on this site are licensed
    under the Creative Commons Attribution 4.0 International (CC BY 4.0) License by the author.



not_found:
  statement: Sorry, we've misplaced that URL or it's pointing to something that doesn't exist.

notification:
  update_found: A new version of content is available.
  update: Update

# ----- Posts related labels -----

post:
  written_by: By
  posted: Dipublikasikan
  updated: Diperbarui
  words: words
  pageview_measure: views
  read_time:
    unit: menit
    prompt: "Estimasi waktu membaca:"
  edit: Edit this post
  relate_posts: Further Reading
  share: "Bagikan"
  button:
    next: LEBIH BARU
    previous: LEBIH LAMA
    copy_code:
      succeed: Copied!
    share_link:
      title: Copy link
      succeed: Link copied successfully!

# Date time format.
# See: <http://strftime.net/>, <https://day.js.org/docs/en/display/format>
df:
  post:
    strftime: "%A, %e %B %Y"
    dayjs: "dddd, D MMMM YYYY"
  archives:
    strftime: "%b"
    dayjs: "MMM"

# categories page
categories:
  category_measure:
    singular: category
    plural: categories
  post_measure:
    singular: post
    plural: posts